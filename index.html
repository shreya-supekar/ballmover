<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>WebXR Finger Walking Locomotion</title>
    <meta name="description" content="Finger-walking locomotion for WebXR Hand Tracking in A-Frame">
    <!-- A-Frame 1.6.0 is required for stable hand tracking features -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script>
      /**
       * Finger Walking Locomotion Component
       * * Usage:
       * Attach to the camera-rig entity.
       * Ensure hand-tracking-controls are present on child entities.
       */
      AFRAME.registerComponent('finger-walking', {
        schema: {
          maxSpeed: { type: 'number', default: 2.0 },      // Meters per second at max frequency
          speedFactor: { type: 'number', default: 1.0 },   // Multiplier for speed mapping
          frequencyWindow: { type: 'number', default: 1.5 }, // Seconds to look back for steps
          stepThreshold: { type: 'number', default: 0.055 }, // Distance (m) between palm and tip to count a "tap"
          stepCooldown: { type: 'number', default: 200 },  // ms between steps per finger
          directionSource: { type: 'string', default: 'head', oneOf: ['head', 'hand'] },
          activationRequired: { type: 'boolean', default: false },
          debug: { type: 'boolean', default: false }
        },

        init: function () {
          // Internal state for tracking "steps"
          // Structure: { left: { index: { lastDist: 0, lastStepTime: 0 }, middle: { ... } }, right: { ... } }
          this.handState = {
            left: this.createHandState(),
            right: this.createHandState()
          };

          this.stepLog = []; // Array of timestamps: [ { time, hand } ]
          this.currentSpeed = 0;
          
          // Reusable vectors to avoid GC
          this.targetVelocity = new THREE.Vector3();
          this.directionVec = new THREE.Vector3();
          this.palmPos = new THREE.Vector3();
          this.tipPos = new THREE.Vector3();
          this.rigQuaternion = new THREE.Quaternion();

          // References to hand entities
          this.hands = {
            left: document.querySelector('#leftHand'),
            right: document.querySelector('#rightHand')
          };
          this.cameraEl = document.querySelector('a-camera');

          if (this.data.debug) {
            this.createDebugUI();
          }
        },

        createHandState: function() {
          return {
            index: { isDown: false, lastStepTime: 0 },
            middle: { isDown: false, lastStepTime: 0 },
            active: false
          };
        },

        createDebugUI: function() {
          this.debugText = document.createElement('a-text');
          this.debugText.setAttribute('value', 'Steps: 0\nFreq: 0\nSpeed: 0');
          this.debugText.setAttribute('position', '0 1.5 -1.5');
          this.debugText.setAttribute('align', 'center');
          this.debugText.setAttribute('color', '#00FF00');
          this.cameraEl.appendChild(this.debugText);
        },

        tick: function (time, delta) {
          if (delta > 200) return; // Ignore large frame jumps

          let totalStepsInWindow = 0;
          const now = performance.now();

          // 1. Detect steps from both hands
          ['left', 'right'].forEach(side => {
            this.processHand(side, now);
          });

          // 2. Filter the step log for the rolling window
          const windowMs = this.data.frequencyWindow * 1000;
          this.stepLog = this.stepLog.filter(step => (now - step.time) < windowMs);

          // 3. Calculate Frequency and Speed
          // 4 steps per second (2 per finger) is roughly a fast walk
          const frequency = this.stepLog.length / this.data.frequencyWindow;
          
          // Map frequency to speed (Linear with a slight ease-in)
          // 0 to 4 freq maps to 0 to maxSpeed
          const targetSpeed = Math.min(this.data.maxSpeed, (frequency / 4) * this.data.maxSpeed * this.data.speedFactor);
          
          // Smooth the speed transition
          this.currentSpeed = THREE.MathUtils.lerp(this.currentSpeed, targetSpeed, 0.1);

          // 4. Apply Movement
          if (this.currentSpeed > 0.01) {
            this.applyMovement(delta / 1000);
          }

          if (this.data.debug && this.debugText) {
            this.debugText.setAttribute('value', 
              `Steps in Window: ${this.stepLog.length}\nFreq: ${frequency.toFixed(2)} Hz\nSpeed: ${this.currentSpeed.toFixed(2)} m/s`
            );
          }
        },

        processHand: function(side, now) {
          const handEntity = this.hands[side];
          if (!handEntity) return;

          const hb = handEntity.components['hand-tracking-controls'];
          if (!hb || !hb.mesh) return;

          // In A-Frame 1.6.0+, joint data is accessed via the mesh/bones or the API
          // We'll use the tracked-controls-webxr data if available
          const controller = handEntity.components['tracked-controls-webxr']?.controller;
          if (!controller || !controller.hand) return;

          const palmJoint = controller.hand.get('palm');
          const indexJoint = controller.hand.get('index-finger-tip');
          const middleJoint = controller.hand.get('middle-finger-tip');

          if (!palmJoint || !indexJoint || !middleJoint) return;

          // Check for activation (e.g. palm facing up)
          if (this.data.activationRequired) {
             // Basic activation: check if palm normal is pointing roughly towards user/up
             // We'll skip for this implementation to keep it "walk-ready"
          }

          this.checkFingerStep(side, 'index', palmJoint, indexJoint, now);
          this.checkFingerStep(side, 'middle', palmJoint, middleJoint, now);
        },

        checkFingerStep: function(side, finger, palm, tip, now) {
          const state = this.handState[side][finger];
          
          // Get Euclidean distance between palm and tip
          const dx = palm.transform.position.x - tip.transform.position.x;
          const dy = palm.transform.position.y - tip.transform.position.y;
          const dz = palm.transform.position.z - tip.transform.position.z;
          const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

          // Step Detection Logic (Palm-relative distance)
          // When distance is low, the finger is "touching" the palm
          if (!state.isDown && dist < this.data.stepThreshold) {
            if (now - state.lastStepTime > this.data.stepCooldown) {
              state.isDown = true;
              state.lastStepTime = now;
              this.stepLog.push({ time: now, hand: side });
            }
          } else if (state.isDown && dist > this.data.stepThreshold + 0.01) {
            // Threshold buffer (+0.01) to prevent flickering
            state.isDown = false;
          }
        },

        applyMovement: function(dt) {
          this.directionVec.set(0, 0, 0);

          if (this.data.directionSource === 'head') {
            // Get camera forward vector (projected on XZ)
            this.cameraEl.object3D.getWorldDirection(this.directionVec);
            this.directionVec.negate(); // Vector points backwards by default in THREE
          } else {
            // Use the most active hand's direction
            // For simplicity, we default to the left hand's forward if available
            const handObj = this.hands.left.object3D;
            handObj.getWorldDirection(this.directionVec);
            this.directionVec.negate();
          }

          // Force XZ plane only
          this.directionVec.y = 0;
          this.directionVec.normalize();

          // Calculate displacement
          const distance = this.currentSpeed * dt;
          this.el.object3D.position.addScaledVector(this.directionVec, distance);
        }
      });
    </script>
  </head>
  <body>
    <a-scene 
      xr-mode-ui="enabled: true" 
      renderer="antialias: true"
      webxr="optionalFeatures: hand-tracking">
      
      <!-- Environment -->
      <a-sky color="#222"></a-sky>
      <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#444" 
               material="roughness: 1; src: https://cdn.aframe.io/a-painter/images/floor.jpg; repeat: 50 50">
      </a-plane>

      <!-- Visual Reference Poles -->
      <a-box position="-5 1 -5" color="red"></a-box>
      <a-box position="5 1 -5" color="blue"></a-box>
      <a-box position="0 1 -10" color="green"></a-box>

      <!-- Camera Rig -->
      <a-entity id="rig" position="0 0 0" finger-walking="debug: true; maxSpeed: 2.5; directionSource: head">
        <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: true"></a-camera>
        
        <!-- Hand Tracking Entities -->
        <a-entity id="leftHand" hand-tracking-controls="hand: left;"></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right;"></a-entity>
      </a-entity>

      <!-- UI Instructions -->
      <a-entity position="0 2 -2">
        <a-text value="FINGER WALKING VR" align="center" width="4"></a-text>
        <a-text value="In VR: Use your index and middle fingers to 'walk' against your palm." 
                position="0 -0.3 0" align="center" width="3" color="#CCC"></a-text>
      </a-entity>

    </a-scene>
  </body>
</html>
