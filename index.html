<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hand-Guided Navigation - WebXR</title>
    <meta name="description" content="VR Locomotion using Hand Proximity and a Floating Sphere">
    <!-- A-Frame Main Library -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- Environment Component for quick scenery -->
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      /**
       * hand-locomotion-sphere Component
       * * Logic: 
       * 1. Tracks the right hand index tip via the WebXR Hand Tracking API.
       * 2. Calculates the distance between the hand and the sphere.
       * 3. If within proximity, treats the hand offset as a 3D joystick vector.
       * 4. Translates the camera rig based on that vector relative to head orientation.
       * 5. Smoothly tethers the sphere to the user's chest when not in use.
       */
      AFRAME.registerComponent('hand-locomotion-sphere', {
        schema: {
          rig: { type: 'selector', default: '#rig' },
          camera: { type: 'selector', default: '#camera' },
          hand: { type: 'selector', default: '#rightHand' },
          speed: { type: 'number', default: 3.0 },
          deadZone: { type: 'number', default: 0.06 },
          hoverDistance: { type: 'number', default: 0.35 },
          maxOffset: { type: 'number', default: 0.5 },
          tetherSpeed: { type: 'number', default: 0.05 } // Interpolation factor
        },

        init: function () {
          this.velocity = new THREE.Vector3();
          this.handPos = new THREE.Vector3();
          this.spherePos = new THREE.Vector3();
          this.offset = new THREE.Vector3();
          this.direction = new THREE.Vector3();
          this.isHovering = false;
          
          // Initial relative offset from chest (0.5m forward, -0.4m down from eyes)
          this.defaultRelativePos = new THREE.Vector3(0, -0.4, -0.5);
          
          console.log("Hand Locomotion System Initialized. Use Right Hand.");
        },

        tick: function (time, deltaTime) {
          if (!this.data.rig || !this.data.hand || !this.data.camera) return;

          const seconds = deltaTime / 1000;
          const rigEl = this.data.rig;
          const handEl = this.data.hand;
          const cameraEl = this.data.camera;

          // 1. Get World Positions
          this.el.object3D.getWorldPosition(this.spherePos);
          
          // Access hand tracking joints
          // A-Frame hand-tracking-controls provides access to bones
          const handMesh = handEl.getObject3D('mesh');
          const indexTip = handEl.components['hand-tracking-controls']?.indexTip;

          if (indexTip) {
            indexTip.getWorldPosition(this.handPos);
          } else {
            // Fallback to hand entity position if joints aren't ready
            handEl.object3D.getWorldPosition(this.handPos);
          }

          // 2. Proximity Check
          const dist = this.handPos.distanceTo(this.spherePos);
          
          if (dist < this.data.hoverDistance) {
            this.isHovering = true;
            this.handleLocomotion(seconds);
            // Visual feedback: Brighten the sphere
            this.el.setAttribute('material', 'emissiveIntensity', 1);
            this.el.setAttribute('scale', '1.1 1.1 1.1');
          } else {
            this.isHovering = false;
            // Visual feedback: Dim the sphere
            this.el.setAttribute('material', 'emissiveIntensity', 0.2);
            this.el.setAttribute('scale', '1 1 1');
            this.tetherToChest(seconds);
          }
        },

        handleLocomotion: function(seconds) {
          // Calculate vector from sphere center to hand
          this.offset.copy(this.handPos).sub(this.spherePos);
          
          // Deadzone check
          const length = this.offset.length();
          if (length < this.data.deadZone) return;

          // Clamp max speed
          const clampedLength = Math.min(length, this.data.maxOffset);
          
          // Normalize offset to get direction, then scale by clamped speed
          this.direction.copy(this.offset).normalize();
          
          // Project movement onto the horizontal plane (X, Z)
          // We use the camera's Y-rotation so "forward" is where user looks
          const rotation = this.data.camera.object3D.rotation.y;
          
          // Map local hand offset to world movement
          // If hand is 'forward' of sphere, move in direction of gaze
          const moveX = (this.offset.x * Math.cos(rotation) + this.offset.z * Math.sin(rotation));
          const moveZ = (this.offset.z * Math.cos(rotation) - this.offset.x * Math.sin(rotation));

          // Apply translation to rig
          const currentPos = this.data.rig.getAttribute('position');
          this.data.rig.setAttribute('position', {
            x: currentPos.x + (moveX * this.data.speed * seconds),
            y: currentPos.y, // Maintain ground height
            z: currentPos.z + (moveZ * this.data.speed * seconds)
          });
        },

        tetherToChest: function(seconds) {
          // Calculate where the sphere "should" be relative to the camera
          const camObj = this.data.camera.object3D;
          const targetWorldPos = new THREE.Vector3().copy(this.defaultRelativePos);
          
          // Apply camera rotation so it stays in front of chest
          targetWorldPos.applyQuaternion(camObj.quaternion);
          // Add camera world position
          targetWorldPos.add(camObj.getWorldPosition(new THREE.Vector3()));
          
          // Smoothly move the sphere entity towards this target
          // We move the object3D directly for smoothness
          this.el.object3D.position.lerp(this.el.sceneEl.object3D.worldToLocal(targetWorldPos), this.data.tetherSpeed);
        }
      });

      // Simple rotation component for environment landmarks
      AFRAME.registerComponent('rotate-slowly', {
        tick: function(t, dt) {
          this.el.object3D.rotation.y += 0.001 * dt;
        }
      });
    </script>
  </head>
  <body>
    <a-scene 
      webxr="optionalFeatures: hand-tracking" 
      renderer="antialias: true; colorManagement: true;"
      bloom="threshold: 0.5; strength: 1.0;">
      
      <!-- Assets -->
      <a-assets>
        <a-mixin id="landmark" geometry="primitive: torusKnot; radius: 0.5; radiusTubular: 0.05" material="color: #4CC3D9; wireframe: false" rotate-slowly></a-mixin>
      </a-assets>

      <!-- Camera Rig -->
      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>
        
        <!-- Hands -->
        <a-entity id="leftHand" hand-tracking-controls="hand: left;"></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right;"></a-entity>

        <!-- Navigation Sphere (Joystick) -->
        <!-- Starts at chest height (~1.2m) and 0.5m forward -->
        <a-entity id="nav-sphere" 
                  geometry="primitive: sphere; radius: 0.15" 
                  material="color: #00ffff; transparent: true; opacity: 0.4; emissive: #00ffff; emissiveIntensity: 0.2"
                  position="0 1.2 -0.5"
                  hand-locomotion-sphere="rig: #rig; camera: #camera; hand: #rightHand">
          
          <!-- Visual Decoration for the sphere -->
          <a-entity geometry="primitive: sphere; radius: 0.16" 
                    material="wireframe: true; color: #ffffff; opacity: 0.2"></a-entity>
          
          <!-- Instructions attached to the sphere -->
          <a-text value="HOVER RIGHT HAND TO MOVE" 
                  position="0 0.25 0" 
                  align="center" 
                  width="1.5" 
                  color="#ffffff"
                  animation="property: opacity; from: 1; to: 0.2; dur: 2000; dir: alternate; loop: true"></a-text>
        </a-entity>
      </a-entity>

      <!-- Environment -->
      <a-entity environment="preset: starry; ground: canyon; groundColor: #111; grid: dashed; gridColor: #222"></a-entity>

      <!-- Movement Indicators / Landmarks -->
      <a-entity position="-10 0 -10" mixin="landmark" material="color: #EF2D5E"></a-entity>
      <a-entity position="10 0 -15" mixin="landmark" material="color: #FFC65D" geometry="primitive: box; height: 10; width: 0.5; depth: 0.5"></a-entity>
      <a-entity position="-5 0 10" mixin="landmark" material="color: #7BC8A4" geometry="primitive: octahedron"></a-entity>
      <a-entity position="15 0 5" mixin="landmark" material="color: #9370DB"></a-entity>
      
      <!-- Floating 'Dust' Particles for speed reference -->
      <a-entity position="0 5 0">
        <!-- We use simple spheres as particles distributed in space -->
        <a-entity geometry="primitive: sphere; radius: 0.02" material="color: #fff; shader: flat" position="2 1 -4"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.02" material="color: #fff; shader: flat" position="-3 2 -8"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.02" material="color: #fff; shader: flat" position="5 -1 -2"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.02" material="color: #fff; shader: flat" position="-1 4 -12"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.02" material="color: #fff; shader: flat" position="8 2 -6"></a-entity>
        <a-entity geometry="primitive: sphere; radius: 0.02" material="color: #fff; shader: flat" position="-6 0 -3"></a-entity>
      </a-entity>

      <!-- Floor Grid Details -->
      <a-grid position="0 0.01 0" rotation="-90 0 0" width="100" height="100" static-body material="transparent: true; opacity: 0.2; color: #00ffff"></a-grid>

      <!-- Lights -->
      <a-light type="ambient" color="#444"></a-light>
      <a-light type="point" intensity="1" position="2 4 4"></a-light>

    </a-scene>

    <!-- Fallback Message -->
    <div id="fallback" style="position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; font-family: sans-serif; display: none; text-align: center;">
      Hand tracking not detected. Use a VR headset like Meta Quest 2/3 with Hand Tracking enabled.
    </div>

    <script>
      // Detection for non-VR users
      if (!navigator.xr) {
        document.getElementById('fallback').style.display = 'block';
        document.getElementById('fallback').innerText = "WebXR not supported in this browser.";
      }
    </script>
  </body>
</html>
