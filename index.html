<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hand-Guided Navigation - Enhanced</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
    
    <script>
      AFRAME.registerComponent('hand-joystick', {
        schema: {
          rig: { type: 'selector', default: '#rig' },
          camera: { type: 'selector', default: '#camera' },
          hand: { type: 'selector', default: '#rightHand' },
          speed: { type: 'number', default: 4.0 },
          deadZone: { type: 'number', default: 0.05 },
          hoverDistance: { type: 'number', default: 0.4 },
          maxOffset: { type: 'number', default: 0.6 }
        },

        init: function () {
          this.handPos = new THREE.Vector3();
          this.spherePos = new THREE.Vector3();
          this.moveVector = new THREE.Vector3();
          this.camForward = new THREE.Vector3();
          this.camRight = new THREE.Vector3();
          
          // Create a visual line to show the movement vector
          this.line = document.createElement('a-entity');
          this.line.setAttribute('line', {color: 'cyan', opacity: 0.7});
          this.el.appendChild(this.line);
          
          console.log("Locomotion active. Hover hand over sphere.");
        },

        tick: function (time, deltaTime) {
          const data = this.data;
          if (!data.hand || !data.rig || !data.camera) return;

          const seconds = deltaTime / 1000;
          
          // 1. Get Sphere World Position
          this.el.object3D.getWorldPosition(this.spherePos);
          
          // 2. Get Hand World Position (Try index tip, fallback to hand entity)
          const handComponent = data.hand.components['hand-tracking-controls'];
          let handTarget = null;
          
          if (handComponent && handComponent.indexTip) {
            handTarget = handComponent.indexTip;
          } else {
            handTarget = data.hand.object3D;
          }
          handTarget.getWorldPosition(this.handPos);

          // 3. Distance Calculation
          const distance = this.handPos.distanceTo(this.spherePos);

          if (distance < data.hoverDistance) {
            // Calculate raw offset
            this.moveVector.copy(this.handPos).sub(this.spherePos);
            
            // Check Deadzone
            const magnitude = this.moveVector.length();
            if (magnitude > data.deadZone) {
              this.applyMovement(magnitude, seconds);
              this.updateVisuals(true);
            } else {
              this.updateVisuals(false);
            }
          } else {
            this.updateVisuals(false);
            this.tetherSphere(seconds);
          }
        },

        applyMovement: function(magnitude, seconds) {
          const data = this.data;
          
          // Get Camera orientation
          const cameraObj = data.camera.object3D;
          cameraObj.getWorldDirection(this.camForward);
          this.camForward.y = 0; // Keep movement horizontal
          this.camForward.normalize();
          
          this.camRight.crossVectors(this.camForward, new THREE.Vector3(0, 1, 0)).normalize();

          // Calculate movement based on hand offset relative to sphere center
          // Offset Z is forward/back, Offset X is left/right
          const forwardAmount = -this.moveVector.z * data.speed * seconds;
          const rightAmount = this.moveVector.x * data.speed * seconds;

          const rigPos = data.rig.getAttribute('position');
          
          // Update Rig Position
          data.rig.setAttribute('position', {
            x: rigPos.x + (this.camForward.x * forwardAmount) + (this.camRight.x * rightAmount),
            y: rigPos.y,
            z: rigPos.z + (this.camForward.z * forwardAmount) + (this.camRight.z * rightAmount)
          });
        },

        updateVisuals: function(active) {
          if (active) {
            this.el.setAttribute('material', 'emissiveIntensity', 1.5);
            this.el.setAttribute('scale', '1.2 1.2 1.2');
            // Draw line from center to hand
            const localHand = this.el.object3D.worldToLocal(this.handPos.clone());
            this.line.setAttribute('line', {start: {x:0, y:0, z:0}, end: localHand});
            this.line.setAttribute('visible', true);
          } else {
            this.el.setAttribute('material', 'emissiveIntensity', 0.3);
            this.el.setAttribute('scale', '1 1 1');
            this.line.setAttribute('visible', false);
          }
        },

        tetherSphere: function(seconds) {
          // Smoothly return sphere to chest-level position in front of user
          const camObj = this.data.camera.object3D;
          const targetPos = new THREE.Vector3(0, -0.4, -0.5); // Local offset from head
          targetPos.applyQuaternion(camObj.quaternion);
          targetPos.add(camObj.getWorldPosition(new THREE.Vector3()));
          
          const sphereWorld = this.el.object3D.parent.worldToLocal(targetPos);
          this.el.object3D.position.lerp(sphereWorld, 0.05);
        }
      });
    </script>
  </head>
  <body>
    <a-scene webxr="optionalFeatures: hand-tracking">
      <a-assets>
        <a-mixin id="tower" geometry="primitive: cylinder; radius: 0.3; height: 10" material="color: #333"></a-mixin>
      </a-assets>

      <a-entity id="rig" position="0 0 0">
        <a-entity id="camera" camera look-controls position="0 1.6 0"></a-entity>
        <a-entity id="leftHand" hand-tracking-controls="hand: left"></a-entity>
        <a-entity id="rightHand" hand-tracking-controls="hand: right"></a-entity>

        <!-- The Control Sphere -->
        <a-entity id="control-sphere"
                  geometry="primitive: sphere; radius: 0.15"
                  material="color: #00ff88; transparent: true; opacity: 0.6; emissive: #00ff88; emissiveIntensity: 0.3"
                  position="0 1.2 -0.5"
                  hand-joystick="rig: #rig; camera: #camera; hand: #rightHand; speed: 5">
          <a-entity geometry="primitive: sphere; radius: 0.16" material="wireframe: true; color: white"></a-entity>
        </a-entity>
      </a-entity>

      <!-- Environment with landmarks -->
      <a-entity environment="preset: osiris; grid: cross; gridColor: #00ff88"></a-entity>
      
      <!-- Visual movement guides -->
      <a-entity position="-10 5 -10" mixin="tower"></a-entity>
      <a-entity position="10 5 -10" mixin="tower"></a-entity>
      <a-entity position="0 5 -20" mixin="tower" material="color: #ff00ff"></a-entity>
      
      <!-- Moving Particles for Speed Feel -->
      <a-entity position="0 2 -5" animation="property: rotation; to: 0 360 0; dur: 20000; loop: true; easing: linear">
        <a-sphere position="5 0 0" radius="0.1" color="yellow"></a-sphere>
        <a-sphere position="-5 1 2" radius="0.1" color="cyan"></a-sphere>
        <a-sphere position="2 2 -4" radius="0.1" color="magenta"></a-sphere>
      </a-entity>

      <a-text value="Hatho ka prayog karke chalo" position="0 2.5 -2" align="center" color="#00ff88"></a-text>
    </a-scene>
  </body>
</html>
